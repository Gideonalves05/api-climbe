services:
  mysql:
    image: 'mysql:8.4'
    container_name: climbe-mysql
    restart: unless-stopped
    environment:
      - 'MYSQL_DATABASE=climbe_db'
      - 'MYSQL_PASSWORD=climbe_pass'
      - 'MYSQL_ROOT_PASSWORD=climbe_root_pass'
      - 'MYSQL_USER=climbe_user'
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pclimbe_root_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
