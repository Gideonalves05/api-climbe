spring.application.name=api-climbe
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =========================
# Banco de dados (MySQL)
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/climbe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:climbe_user}
spring.datasource.password=${DB_PASSWORD:climbe_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# =========================
# Docker Compose
# =========================
spring.docker.compose.enabled=true
spring.docker.compose.file=compose.yaml
spring.docker.compose.lifecycle-management=start_only

# =========================
# Security / OAuth2
# =========================
# Google OAuth2 - requer GOOGLE_CLIENT_ID e GOOGLE_CLIENT_SECRET para funcionar
# Para habilitar login com Google, descomente as linhas abaixo e configure as variáveis de ambiente
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive,https://www.googleapis.com/auth/calendar,https://www.googleapis.com/auth/spreadsheets,https://www.googleapis.com/auth/gmail.send
# spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/oauth2/callback/google}
# spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
# spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
# spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
# spring.security.oauth2.client.provider.google.user-name-attribute=sub

# =========================
# JWT (base para evolução)
# =========================
app.jwt.secret=${APP_JWT_SECRET:alterar_em_producao}
app.jwt.issuer=${APP_JWT_ISSUER:api-climbe}
app.jwt.expiracao-minutos=${APP_JWT_EXPIRACAO_MINUTOS:60}

# =========================
# Integrações Google APIs
# =========================
# OAuth2 Configuration
google.integracoes.oauth2.client-id=${GOOGLE_CLIENT_ID:}
google.integracoes.oauth2.client-secret=${GOOGLE_CLIENT_SECRET:}
google.integracoes.oauth2.scope=${GOOGLE_SCOPE:openid,profile,email}
google.integracoes.oauth2.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/oauth2/callback/google}

# Google Sheets
google.integracoes.sheets.habilitado=${GOOGLE_SHEETS_HABILITADO:false}
google.integracoes.sheets.base-url=${GOOGLE_SHEETS_BASE_URL:https://sheets.googleapis.com}
google.integracoes.sheets.timeout-seconds=${GOOGLE_SHEETS_TIMEOUT_SECONDS:30}
google.integracoes.sheets.max-retries=${GOOGLE_SHEETS_MAX_RETRIES:3}
google.integracoes.sheets.retry-delay-ms=${GOOGLE_SHEETS_RETRY_DELAY_MS:1000}

# Google Drive
google.integracoes.drive.habilitado=${GOOGLE_DRIVE_HABILITADO:false}
google.integracoes.drive.base-url=${GOOGLE_DRIVE_BASE_URL:https://www.googleapis.com/drive}
google.integracoes.drive.timeout-seconds=${GOOGLE_DRIVE_TIMEOUT_SECONDS:30}
google.integracoes.drive.max-retries=${GOOGLE_DRIVE_MAX_RETRIES:3}
google.integracoes.drive.retry-delay-ms=${GOOGLE_DRIVE_RETRY_DELAY_MS:1000}

# Google Calendar
google.integracoes.calendar.habilitado=${GOOGLE_CALENDAR_HABILITADO:false}
google.integracoes.calendar.base-url=${GOOGLE_CALENDAR_BASE_URL:https://www.googleapis.com/calendar}
google.integracoes.calendar.timeout-seconds=${GOOGLE_CALENDAR_TIMEOUT_SECONDS:30}
google.integracoes.calendar.max-retries=${GOOGLE_CALENDAR_MAX_RETRIES:3}
google.integracoes.calendar.retry-delay-ms=${GOOGLE_CALENDAR_RETRY_DELAY_MS:1000}

# Google Gmail
google.integracoes.gmail.habilitado=${GOOGLE_GMAIL_HABILITADO:false}
google.integracoes.gmail.base-url=${GOOGLE_GMAIL_BASE_URL:https://gmail.googleapis.com}
google.integracoes.gmail.timeout-seconds=${GOOGLE_GMAIL_TIMEOUT_SECONDS:30}
google.integracoes.gmail.max-retries=${GOOGLE_GMAIL_MAX_RETRIES:3}
google.integracoes.gmail.retry-delay-ms=${GOOGLE_GMAIL_RETRY_DELAY_MS:1000}

# Retry Configuration Global
google.integracoes.retry.max-attempts=${GOOGLE_RETRY_MAX_ATTEMPTS:3}
google.integracoes.retry.backoff-ms=${GOOGLE_RETRY_BACKOFF_MS:1000}
google.integracoes.retry.backoff-multiplier=${GOOGLE_RETRY_BACKOFF_MULTIPLIER:2.0}

# =========================
# Notificações
# =========================
app.notificacao.dispatcher-interval-segundos=30
app.notificacao.batch-size=100
app.notificacao.sse-timeout=30m
app.notificacao.sse-heartbeat-interval=25s
app.notificacao.sla-in-app-segundos=10s
app.notificacao.sla-email-minutos=5m
app.notificacao.cleanup-dias=30

# =========================
# Upload de arquivos
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# Swagger / OpenAPI
# =========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
