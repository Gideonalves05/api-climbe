spring.application.name=api-climbe

# =========================
# Banco de dados (MySQL)
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/climbe_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:climbe_user}
spring.datasource.password=${DB_PASSWORD:climbe_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================
# Docker Compose
# =========================
spring.docker.compose.enabled=true
spring.docker.compose.lifecycle-management=start_only

# =========================
# Security / OAuth2
# =========================
# Propriedades Google OAuth2 temporariamente desativadas.
# Reative quando for usar login/integrações Google.
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/drive,https://www.googleapis.com/auth/calendar,https://www.googleapis.com/auth/spreadsheets,https://www.googleapis.com/auth/gmail.send

# =========================
# JWT (base para evolução)
# =========================
app.jwt.secret=${APP_JWT_SECRET:alterar_em_producao}
app.jwt.issuer=${APP_JWT_ISSUER:api-climbe}
app.jwt.expiracao-minutos=${APP_JWT_EXPIRACAO_MINUTOS:60}

